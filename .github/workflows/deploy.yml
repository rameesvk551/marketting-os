name: Build & Deploy to Production

on:
  push:
    branches:
      - production
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Backend & Frontend
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # Backend Build
      - name: Install backend dependencies
        working-directory: marketing-os-server
        run: npm ci

      - name: Build backend
        working-directory: marketing-os-server
        run: npm run build
        env:
          CI: true

      - name: Verify backend build
        run: |
          if [ -f marketing-os-server/dist/server.js ]; then
            echo "✓ Backend build successful"
          else
            echo "✗ Backend build failed - dist/server.js not found"
            ls -la marketing-os-server/dist/ || echo "dist directory doesn't exist"
            exit 1
          fi

      # Frontend Build
      - name: Install frontend dependencies
        working-directory: marketing-os-ui
        run: npm ci

      - name: Build frontend
        working-directory: marketing-os-ui
        run: npm run build
        env:
          CI: true

      - name: Verify frontend build
        run: |
          if [ -f marketing-os-ui/dist/index.html ]; then
            echo "✓ Frontend build successful"
          else
            echo "✗ Frontend build failed - dist/index.html not found"
            ls -la marketing-os-ui/dist/ || echo "dist directory doesn't exist"
            exit 1
          fi



  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      # Setup SSH
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Deploy to EC2
      - name: Deploy to EC2
        run: |
          # Test SSH connection
          ssh -o ConnectTimeout=5 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo '✓ SSH connection successful'"
          
          # Pull latest code on EC2
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cd ~/marketting-os && git pull origin production"
          
          # Build backend on EC2
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cd ~/marketting-os/marketing-os-server && npm ci && npm run build"
          
          # Build frontend on EC2
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cd ~/marketting-os/marketing-os-ui && npm ci && npm run build"
          
          # Copy frontend to nginx directory
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo mkdir -p /var/www/marketing-os && sudo rm -rf /var/www/marketing-os/marketing-os-ui && sudo cp -r ~/marketting-os/marketing-os-ui /var/www/marketing-os/ && sudo chown -R nginx:nginx /var/www/marketing-os"
          
          # Make deploy script executable and run it
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "chmod +x ~/marketting-os/deploy.sh && bash ~/marketting-os/deploy.sh"

      - name: Deployment Status
        if: success()
        run: echo "✅ Deployment successful!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed!"
