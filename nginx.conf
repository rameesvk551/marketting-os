# =============================================================
# Nginx Configuration for Marketing OS
# Frontend: app.wayon.in
# Backend:  api.app.wayon.in
# =============================================================

# ── Rate Limiting ──────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ── Upstream Definitions ──────────────────────────────────────
upstream backend_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# =============================================================
# 1. HTTP → HTTPS Redirect (both domains)
# =============================================================
server {
    listen 80;
    server_name app.wayon.in api.app.wayon.in;

    # Let's Encrypt / Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================
# 2. Frontend – app.wayon.in
# =============================================================
server {
    listen 443 ssl http2;
    server_name app.wayon.in;

    # ── SSL Certificates (Certbot / Let's Encrypt) ────────────
    ssl_certificate     /etc/letsencrypt/live/app.wayon.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.wayon.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Document Root (Vite build output) ─────────────────────
    root /var/www/marketing-os/marketing-os-ui/dist;
    index index.html;

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Cache Static Assets ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA Fallback (React Router) ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# =============================================================
# 3. Backend API – api.app.wayon.in
# =============================================================
server {
    listen 443 ssl http2;
    server_name api.app.wayon.in;

    # ── SSL Certificates (Certbot / Let's Encrypt) ────────────
    ssl_certificate     /etc/letsencrypt/live/api.app.wayon.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.app.wayon.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Client Body Size (for file uploads) ───────────────────
    client_max_body_size 50M;

    # ── CORS Headers (nginx-level for reliability) ───────────
    add_header Access-Control-Allow-Origin "https://app.wayon.in" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-Slug, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Handle preflight OPTIONS requests at nginx level
    location = /preflight {
        internal;
    }

    # ── Reverse Proxy to Node.js Backend ──────────────────────
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        # Handle OPTIONS preflight at nginx level
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://app.wayon.in" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-Slug, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type "text/plain charset=UTF-8";
            return 204;
        }

        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        # WebSocket support (for Socket.io / WhatsApp real-time)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── WhatsApp Webhook (higher timeout, no rate limit) ──────
    location /api/webhooks/whatsapp {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

}
